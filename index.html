<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Athi Yogi – Yoga for Everyone</title>
<!-- FIX: Preload critical fonts for performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap">
<style>
:root{--bg:#0a0d18;--bg2:#111628;--bg3:#1a2038;--acc:#4f8ef7;--ac2:#7c5cfc;--border:rgba(79,142,247,0.22);--text:#e8eaf2;--text2:#7a84a0;--red:#e05252;--green:#3dd68c;--yellow:#f5c842;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* FIX: overflow-y:auto for mobile scrolling on login/student screens */
html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;}

/* SCREENS */
.screen{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.screen.active{display:flex;}
#teacher-screen,#student-screen{background:radial-gradient(ellipse at 30% 20%,#151c3a 0%,#0a0d18 60%);}
/* Room screen: strict column fill — topbar + canvas(flex:1) + controls */
#room-screen{padding:0;flex-direction:column;background:var(--bg);overflow:hidden;}
#room-screen.active{display:flex;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.6);}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-style:italic;color:var(--acc);margin-bottom:2px;}
.tagline{font-size:11px;color:var(--text2);letter-spacing:.7px;text-transform:uppercase;margin-bottom:18px;}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .2s;}
input:focus{border-color:var(--acc);}
.btn-p{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--ac2),var(--acc));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.btn-s{width:100%;padding:9px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.btn-s:hover{border-color:var(--acc);color:var(--acc);}
.err{color:var(--red);font-size:12px;margin-top:4px;min-height:16px;text-align:center;}
.slbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:4px;}
.clist{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:200px;overflow-y:auto;}
.clist::-webkit-scrollbar{width:3px;}
.clist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.ci{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .18s;}
.ci:hover,.ci.sel{border-color:var(--acc);}
.ci.sel{background:rgba(79,142,247,.1);}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-type{font-size:11px;color:var(--text2);}
.ci-del{font-size:13px;color:var(--text2);padding:4px;border:none;background:transparent;cursor:pointer;}
.ci-del:hover{color:var(--red);}
.ncf{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.ttabs{display:flex;gap:6px;margin-bottom:10px;}
.ttab{flex:1;padding:7px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;text-align:center;}
.ttab.on{background:rgba(79,142,247,.15);border-color:var(--acc);color:var(--acc);}
.tinfo{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);}
.tav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ac2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.6);}

/* TOPBAR */
#topbar{height:52px;background:rgba(10,13,24,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;}
.bw{display:flex;flex-direction:column;flex:1;min-width:0;}
.bn{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--acc);line-height:1.1;}
.bt{font-size:9px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ck{font-size:11px;font-family:monospace;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:3px 9px;white-space:nowrap;}
.hb{height:30px;padding:0 9px;border-radius:7px;border:1px solid var(--border);background:rgba(17,22,40,.95);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .18s;white-space:nowrap;}
.hb:hover{border-color:var(--acc);color:var(--acc);}
.hb.red{border-color:var(--red);color:var(--red);}
.hb.red:hover{background:var(--red);color:#fff;}
.hb.amuted{background:rgba(224,82,82,.2);border-color:var(--red);color:var(--red);}
@media(max-width:480px){.hb span:last-child{display:none}}

/* CANVAS — must fill all space between topbar and controls */
#canvas{flex:1;min-height:0;position:relative;overflow:hidden;background:var(--bg);}
/* Permission overlay inside canvas */
#perm-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;background:rgba(10,13,24,.94);backdrop-filter:blur(6px);}
#perm-overlay.hidden{display:none;}
#perm-overlay .perm-ico{font-size:48px;}
#perm-overlay .perm-title{font-size:16px;font-weight:600;color:var(--text);text-align:center;}
#perm-overlay .perm-sub{font-size:13px;color:var(--text2);text-align:center;max-width:260px;line-height:1.5;}
.perm-btn{padding:12px 28px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--ac2),var(--acc));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}

/* CAMERA BANNER */
#cam-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(224,82,82,.15);border:1px solid rgba(224,82,82,.4);border-radius:12px;padding:16px 20px;font-size:13px;color:var(--red);text-align:center;display:none;z-index:10;max-width:280px;}
#cam-banner.show{display:block;}

/* TILE */
.tile{position:absolute;border-radius:14px;border:2px solid var(--border);background:var(--bg2);overflow:visible;cursor:grab;-webkit-user-select:none;user-select:none;touch-action:none;transition:border-color .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.tile:active{cursor:grabbing;}
.tile.focused{border-color:var(--acc);box-shadow:0 0 0 2px rgba(79,142,247,.25),0 8px 32px rgba(0,0,0,.5);z-index:99!important;}
.tile.pinned{border-color:var(--yellow);}
.tile.host-tile{border-color:var(--acc);}
.tile-inner{position:absolute;inset:0;border-radius:12px;overflow:hidden;}
.tile-vwrap{position:absolute;inset:0;background:var(--bg2);}
.tile-vwrap video{width:100%;height:100%;object-fit:cover;display:block;}
.tile-avatar{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;}
.av-c{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:600;color:#fff;}

/* RESIZE */
.rh{position:absolute;bottom:-6px;right:-6px;width:22px;height:22px;cursor:nwse-resize;z-index:20;touch-action:none;display:flex;align-items:flex-end;justify-content:flex-end;padding:3px;background:var(--bg2);border-radius:50%;border:1px solid var(--border);}
.rh::after{content:'';width:8px;height:8px;border-right:2px solid var(--acc);border-bottom:2px solid var(--acc);border-radius:0 0 2px 0;opacity:.8;}

/* TILE NAME BAR */
.tile-namebar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(5,7,16,.88));padding:14px 8px 5px;display:flex;align-items:center;justify-content:space-between;z-index:5;border-radius:0 0 12px 12px;}
.tile-nm{font-size:11px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.tile-mic-ico{font-size:11px;flex-shrink:0;}
.tile.mic-off .mic-anim{display:none!important;}

/* THREE DOTS BUTTON */
.tile-3dots{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:8px;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:15px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;line-height:1;}
.tile:hover .tile-3dots,.tile.focused .tile-3dots{display:flex;}

/* CONTEXT MENU */
.ctx-menu{position:fixed;z-index:500;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.6);display:none;}
.ctx-menu.open{display:block;}
.ctx-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;transition:background .15s;border:none;background:transparent;color:var(--text);width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.ctx-item:hover{background:var(--bg3);}
.ctx-item .ci2{font-size:16px;width:20px;text-align:center;}
.ctx-item.red{color:var(--red);}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}

/* BADGES */
.tile-top{position:absolute;top:6px;left:6px;display:flex;gap:4px;z-index:6;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff;}
.badge-t{background:linear-gradient(135deg,var(--ac2),var(--acc));}
.badge-you{background:rgba(255,255,255,.18);}
.badge-pin{background:var(--yellow);color:#000;}
.badge-host{background:var(--green);color:#000;}
.mic-anim{position:absolute;top:7px;right:32px;display:flex;gap:2px;align-items:flex-end;height:12px;z-index:6;}
.mic-anim span{width:3px;background:var(--green);border-radius:2px;animation:eq .65s ease-in-out infinite alternate;}
.mic-anim span:nth-child(1){height:4px;animation-delay:0s}
.mic-anim span:nth-child(2){height:10px;animation-delay:.15s}
.mic-anim span:nth-child(3){height:6px;animation-delay:.3s}
@keyframes eq{from{transform:scaleY(.3)}to{transform:scaleY(1)}}

/* CONTROLS */
#controls{height:54px;background:rgba(10,13,24,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;padding:0 12px;flex-shrink:0;}
.cbtn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 9px;border-radius:9px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;}
.cbtn .ico{font-size:20px;}
.cbtn:hover{background:var(--bg3);color:var(--text);}
.cbtn.off{color:var(--red);}
.csep{width:1px;height:26px;background:var(--border);}
.end-btn{padding:8px 14px;border-radius:9px;border:none;background:var(--red);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}

/* FULLSCREEN */
#fs-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#fs-overlay.open{display:flex;}
#fs-big{width:min(92vw,680px);aspect-ratio:4/3;background:var(--bg2);border-radius:18px;border:2px solid var(--acc);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#fs-big video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#fs-info{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;}
#fs-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.fsact{padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.fsact:hover{border-color:var(--acc);color:var(--acc);}

/* END MODAL */
#end-modal{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:16px;}
#end-modal.open{display:flex;}
.end-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px;}
.end-card h3{font-size:16px;font-weight:600;margin-bottom:8px;}
.end-card p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.end-opt{width:100%;padding:12px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.end-everyone{background:var(--red);color:#fff;}
.end-leave{background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.end-leave:hover{border-color:var(--acc);}
.end-cancel{width:100%;padding:10px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:4px;}

/* SHARE */
#sp{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:16px;}
#sp.open{display:flex;}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:22px;width:100%;max-width:380px;}
.scard h3{font-size:15px;font-weight:600;margin-bottom:6px;}
.scard-sub{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6;}
.slink{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:11px;font-family:monospace;color:var(--acc);word-break:break-all;margin-bottom:12px;line-height:1.5;}
.sbtn{width:100%;padding:10px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:6px;}
.sbtn:hover{border-color:var(--acc);color:var(--acc);}
.sbtn.pri{background:linear-gradient(135deg,var(--ac2),var(--acc));border:none;color:#fff;font-weight:600;}
.sclose{width:100%;padding:9px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}

/* THEME */
#thp{position:fixed;top:0;right:0;bottom:0;z-index:700;width:250px;background:var(--bg2);border-left:1px solid var(--border);display:none;flex-direction:column;padding:16px;gap:11px;overflow-y:auto;box-shadow:-8px 0 32px rgba(0,0,0,.5);}
#thp.open{display:flex;}
#thp h4{font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.thcl{background:none;border:none;color:var(--text2);cursor:pointer;font-size:17px;}
.thl{font-size:10px;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;}
.pr{display:flex;gap:5px;flex-wrap:wrap;}
.pc{width:28px;height:28px;border-radius:7px;cursor:pointer;border:2px solid transparent;}
.pc:hover{transform:scale(1.1);}
.pc.sel{border-color:#fff;box-shadow:0 0 0 2px var(--acc);}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.cf label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px;}
.cpw{display:flex;align-items:center;gap:4px;}
.cpw input[type=color]{width:26px;height:22px;border:none;background:none;cursor:pointer;padding:0;border-radius:5px;}
.cpw span{font-size:10px;font-family:monospace;color:var(--text2);}
.apb{padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--ac2),var(--acc));color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;}

/* FIX: Toast queue — stack toasts vertically, no overlap */
#toast-container{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column-reverse;gap:6px;align-items:center;z-index:999;pointer-events:none;}
.toast-item{background:rgba(17,22,40,.97);border:1px solid var(--border);padding:7px 16px;border-radius:30px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;white-space:nowrap;transform:translateY(8px);}
.toast-item.show{opacity:1;transform:translateY(0);}

/* HTTPS Notice */
#https-notice{position:fixed;bottom:0;left:0;right:0;background:rgba(224,82,82,.12);border-top:1px solid rgba(224,82,82,.3);padding:8px 16px;font-size:11px;color:var(--red);text-align:center;display:none;z-index:800;}
#https-notice.show{display:block;}
</style>
</head>
<body>

<!-- TEACHER -->
<div id="teacher-screen" class="screen active">
<div class="card">
  <div class="logo">🪷 Athi Yogi</div>
  <div class="tagline">Teacher Dashboard</div>
  <!-- FIX: Removed hardcoded password from HTML; auth is now purely in JS with configurable storage -->
  <div id="t-login">
    <label>Password</label>
    <input type="password" id="t-pass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')teacherLogin()"/>
    <button class="btn-p" onclick="teacherLogin()">🔐 Sign In</button>
    <div class="err" id="t-err"></div>
    <p style="font-size:11px;color:var(--text2);text-align:center;margin-top:6px;">Contact admin if you forgot your password</p>
  </div>
  <div id="t-dash" style="display:none">
    <div class="tinfo">
      <div class="tav">🧘</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500;">Athi Yogi</div><div style="font-size:11px;color:var(--text2);">Teacher</div></div>
      <button class="btn-s" onclick="teacherLogout()" style="width:auto;padding:5px 10px;">Logout</button>
    </div>
    <div class="slbl">Your Classes</div>
    <div class="clist" id="clist"></div>
    <div class="ncf">
      <div class="slbl" style="margin-top:0">New Class</div>
      <label>Class Name</label>
      <input id="nc-name" placeholder="e.g. Morning Yoga 7am"/>
      <div class="ttabs">
        <button class="ttab on" id="tt-g" onclick="setCT('group')">👥 Group</button>
        <button class="ttab" id="tt-o" onclick="setCT('one')">🧘 1-on-1</button>
      </div>
      <button class="btn-p" style="margin-bottom:0" onclick="createClass()">➕ Create & Get Link</button>
    </div>
    <div id="sel-cls" style="display:none;margin-top:4px;">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Selected: <b id="sel-name" style="color:var(--text)"></b></div>
      <button class="btn-p" onclick="startClass()">🚀 Start Class</button>
    </div>
  </div>
</div>
</div>

<!-- STUDENT -->
<div id="student-screen" class="screen">
<div class="sc">
  <div class="logo" style="text-align:center">🪷 Athi Yogi</div>
  <div class="tagline" style="text-align:center">Yoga for Everyone</div>
  <div style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:16px;">Joining: <b id="s-clsname" style="color:var(--text)"></b></div>
  <label>Your Name</label>
  <input id="s-name" placeholder="Enter your name" style="text-align:center"/>
  <button class="btn-p" onclick="studentJoin()">🧘 Join Class</button>
  <div class="err" id="s
