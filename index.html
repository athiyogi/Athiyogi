<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Athi Meet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eaeaea;
    --muted: #8892a4;
    --green: #00c9a7;
    --red: #e94560;
    --radius: 12px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── LOBBY ── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 24px;
    padding: 20px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  #lobby h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(90deg, #e94560, #533483);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #lobby p.sub {
    color: var(--muted);
    font-size: 1rem;
    text-align: center;
  }

  .lobby-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 36px 40px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(12px);
  }

  .lobby-card input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--text);
    font-size: 1rem;
    padding: 14px 16px;
    outline: none;
    transition: border 0.2s;
  }
  .lobby-card input:focus { border-color: var(--accent); }
  .lobby-card input::placeholder { color: var(--muted); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    padding: 14px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.95rem;
    padding: 13px;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.13); }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  /* ── ROOM ── */
  #room { display: none; flex-direction: column; height: 100vh; }

  /* Top bar */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }

  #topbar .logo {
    font-weight: 700;
    font-size: 1.1rem;
    background: linear-gradient(90deg, #e94560, #533483);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #topbar .room-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  #topbar .room-id-badge {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
    transition: background 0.2s;
  }
  #topbar .room-id-badge:hover { background: rgba(255,255,255,0.14); }

  #timer {
    color: var(--muted);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }

  /* Video grid */
  #video-grid-wrapper {
    flex: 1;
    overflow: hidden;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video-grid {
    display: grid;
    gap: 8px;
    width: 100%;
    height: 100%;
    max-height: 100%;
  }

  .video-tile {
    position: relative;
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .video-tile.speaking { border-color: var(--green); }
  .video-tile.pinned { border-color: var(--accent); }

  .video-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1); /* mirror local */
  }
  .video-tile.remote video { transform: none; }

  .video-tile .no-video {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #0f3460, #16213e);
  }

  .avatar-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .tile-name {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.55);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.78rem;
    color: #fff;
    max-width: calc(100% - 16px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
  }

  .tile-muted-icon {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(233,69,96,0.85);
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
  }
  .tile-muted-icon.show { display: flex; }

  .tile-pin-btn {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.45);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 4px 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .video-tile:hover .tile-pin-btn { opacity: 1; }

  /* Bottom controls */
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px 20px 18px;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }

  .ctrl-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: background 0.2s, transform 0.1s;
    position: relative;
  }
  .ctrl-btn:active { transform: scale(0.92); }

  .ctrl-btn.on  { background: rgba(255,255,255,0.12); color: #fff; }
  .ctrl-btn.off { background: var(--red); color: #fff; }
  .ctrl-btn.leave { background: var(--red); color: #fff; width: 60px; height: 60px; font-size: 1.4rem; }

  .ctrl-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  .ctrl-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,50,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.9rem;
    opacity: 0;
    padding: 10px 20px;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Status dot */
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
  }
  .status-dot.connected { background: var(--green); }

  /* Responsive grid helpers — set via JS */
</style>
</head>
<body>

<!-- ═══════════════ LOBBY ═══════════════ -->
<div id="lobby">
  <h1>Athi Meet</h1>
  <p class="sub">Instant video meetings — no downloads, no sign-in</p>

  <div class="lobby-card">
    <input id="nameInput" type="text" placeholder="Your name" maxlength="30" />

    <button class="btn-primary" onclick="createRoom()">🎬 New Meeting</button>

    <div class="divider">or join existing</div>

    <input id="roomInput" type="text" placeholder="Room ID" maxlength="20" />
    <button class="btn-secondary" onclick="joinRoom()">Join Meeting</button>
  </div>

  <p style="color:var(--muted);font-size:0.78rem;text-align:center;max-width:380px;">
    Meetings use direct peer-to-peer WebRTC connections.<br/>
    A free signaling server on Render handles room coordination.
  </p>
</div>

<!-- ═══════════════ ROOM ═══════════════ -->
<div id="room">
  <div id="topbar">
    <span class="logo">Athi Meet</span>
    <div class="room-info">
      <span class="status-dot" id="statusDot"></span>
      <span id="peerCount">1 participant</span>
      <span class="room-id-badge" id="roomIdBadge" onclick="copyRoomId()" title="Click to copy">
        Room: <span id="roomIdDisplay"></span>
      </span>
    </div>
    <span id="timer">00:00</span>
  </div>

  <div id="video-grid-wrapper">
    <div id="video-grid"></div>
  </div>

  <div id="controls">
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="micBtn" onclick="toggleMic()">🎤</button>
      <span class="ctrl-label">Mic</span>
    </div>
    <div class="ctrl-wrap">
      <button class="ctrl-btn on" id="camBtn" onclick="toggleCam()">📷</button>
      <span class="ctrl-label">Camera</span>
    </div>
    <div class="ctrl-wrap">
      <button class="ctrl-btn leave" onclick="leaveRoom()">📞</button>
      <span class="ctrl-label">Leave</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════════
   CONFIG — replace WS_URL with your signaling
   server URL after deploying server.js
   ════════════════════════════════════════════ */
const WS_URL = 'wss://athiyogi-meet.onrender.com';

/* ════ State ════ */
let localStream = null;
let myName = '';
let myId = '';
let roomId = '';
let ws = null;
let peers = {};          // peerId → RTCPeerConnection
let peerNames = {};      // peerId → name
let peerStreams = {};     // peerId → MediaStream
let micOn = true;
let camOn = true;
let timerInterval = null;
let startTime = null;
let pinnedPeer = null;

const iceConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    /* Add TURN here for production:
       { urls: 'turn:your-turn-server', username:'u', credential:'p' } */
  ]
};

/* ════ Lobby actions ════ */
function createRoom() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('Enter your name'); return; }
  myName = name;
  roomId = Math.random().toString(36).slice(2, 8).toUpperCase();
  startMeeting();
}

function joinRoom() {
  const name = document.getElementById('nameInput').value.trim();
  const rid  = document.getElementById('roomInput').value.trim().toUpperCase();
  if (!name) { showToast('Enter your name'); return; }
  if (!rid)  { showToast('Enter a room ID'); return; }
  myName = name;
  roomId = rid;
  startMeeting();
}

/* ════ Start meeting ════ */
async function startMeeting() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    showToast('Camera/mic access denied');
    return;
  }

  myId = Math.random().toString(36).slice(2, 10);

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').style.display = 'flex';
  document.getElementById('roomIdDisplay').textContent = roomId;

  addLocalTile();
  connectSignaling();
  startTimer();
}

/* ════ Local tile ════ */
function addLocalTile() {
  const grid = document.getElementById('video-grid');
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = 'tile-local';

  const video = document.createElement('video');
  video.autoplay = true;
  video.muted = true;
  video.playsInline = true;
  video.srcObject = localStream;
  tile.appendChild(video);

  const nameTag = document.createElement('div');
  nameTag.className = 'tile-name';
  nameTag.textContent = myName + ' (You)';
  tile.appendChild(nameTag);

  grid.appendChild(tile);
  relayout();
}

/* ════ Signaling ════ */
function connectSignaling() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('statusDot').className = 'status-dot connected';
    ws.send(JSON.stringify({ type: 'join', roomId, peerId: myId, name: myName }));
  };

  ws.onclose = () => {
    document.getElementById('statusDot').className = 'status-dot';
    showToast('Disconnected from signaling server');
  };

  ws.onerror = () => showToast('Cannot reach signaling server — check WS_URL');

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'peers') {
      // Server sends list of existing peers when we join
      for (const p of msg.peers) {
        peerNames[p.id] = p.name;
        await createOffer(p.id);
      }
    }

    else if (msg.type === 'offer') {
      peerNames[msg.from] = msg.name;
      await handleOffer(msg);
    }

    else if (msg.type === 'answer') {
      const pc = peers[msg.from];
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
    }

    else if (msg.type === 'ice') {
      const pc = peers[msg.from];
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
    }

    else if (msg.type === 'leave') {
      removePeer(msg.from);
    }

    else if (msg.type === 'mute') {
      updatePeerMuteIcon(msg.from, msg.audioMuted);
    }
  };
}

function signal(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

/* ════ WebRTC helpers ════ */
function createPeerConnection(peerId) {
  const pc = new RTCPeerConnection(iceConfig);
  peers[peerId] = pc;

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) signal({ type: 'ice', to: peerId, from: myId, candidate: e.candidate });
  };

  pc.ontrack = (e) => {
    peerStreams[peerId] = e.streams[0];
    renderRemoteTile(peerId);
  };

  pc.onconnectionstatechange = () => {
    if (['disconnected','failed','closed'].includes(pc.connectionState)) removePeer(peerId);
  };

  return pc;
}

async function createOffer(peerId) {
  const pc = createPeerConnection(peerId);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  signal({ type: 'offer', to: peerId, from: myId, name: myName, sdp: offer });
}

async function handleOffer(msg) {
  const pc = createPeerConnection(msg.from);
  await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  signal({ type: 'answer', to: msg.from, from: myId, sdp: answer });
}

/* ════ Remote tile ════ */
function renderRemoteTile(peerId) {
  const grid = document.getElementById('video-grid');
  let tile = document.getElementById('tile-' + peerId);

  if (!tile) {
    tile = document.createElement('div');
    tile.id = 'tile-' + peerId;
    tile.className = 'video-tile remote';

    const pinBtn = document.createElement('button');
    pinBtn.className = 'tile-pin-btn';
    pinBtn.textContent = '📌 Pin';
    pinBtn.onclick = () => pinTile(peerId);
    tile.appendChild(pinBtn);

    const mutedIcon = document.createElement('div');
    mutedIcon.className = 'tile-muted-icon';
    mutedIcon.id = 'muted-' + peerId;
    mutedIcon.textContent = '🔇';
    tile.appendChild(mutedIcon);

    const nameTag = document.createElement('div');
    nameTag.className = 'tile-name';
    nameTag.textContent = peerNames[peerId] || peerId;
    tile.appendChild(nameTag);

    grid.appendChild(tile);
    relayout();
    updatePeerCount();
    showToast((peerNames[peerId] || 'Someone') + ' joined');
  }

  // Attach stream to video (create or reuse)
  let video = tile.querySelector('video');
  const noVideo = tile.querySelector('.no-video');
  if (noVideo) noVideo.remove();

  if (!video) {
    video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    tile.insertBefore(video, tile.firstChild);
  }
  video.srcObject = peerStreams[peerId];
}

function removePeer(peerId) {
  if (peers[peerId]) { peers[peerId].close(); delete peers[peerId]; }
  delete peerStreams[peerId];
  const tile = document.getElementById('tile-' + peerId);
  if (tile) tile.remove();
  showToast((peerNames[peerId] || 'Someone') + ' left');
  delete peerNames[peerId];
  if (pinnedPeer === peerId) { pinnedPeer = null; }
  relayout();
  updatePeerCount();
}

/* ════ Controls ════ */
function toggleMic() {
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = document.getElementById('micBtn');
  btn.textContent = micOn ? '🎤' : '🔇';
  btn.className = 'ctrl-btn ' + (micOn ? 'on' : 'off');
  signal({ type: 'mute', roomId, from: myId, audioMuted: !micOn });
}

function toggleCam() {
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  const btn = document.getElementById('camBtn');
  btn.textContent = camOn ? '📷' : '🚫';
  btn.className = 'ctrl-btn ' + (camOn ? 'on' : 'off');

  const localTile = document.getElementById('tile-local');
  const vid = localTile.querySelector('video');
  if (!camOn) {
    if (vid) vid.style.display = 'none';
    let noVid = localTile.querySelector('.no-video');
    if (!noVid) {
      noVid = document.createElement('div');
      noVid.className = 'no-video';
      noVid.innerHTML = `<div class="avatar-circle">${myName[0].toUpperCase()}</div><span style="color:var(--muted);font-size:0.85rem">Camera off</span>`;
      localTile.insertBefore(noVid, localTile.firstChild);
    }
  } else {
    if (vid) vid.style.display = '';
    const noVid = localTile.querySelector('.no-video');
    if (noVid) noVid.remove();
  }
}

function leaveRoom() {
  signal({ type: 'leave', roomId, from: myId });
  cleanup();
  document.getElementById('room').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('video-grid').innerHTML = '';
}

function cleanup() {
  Object.values(peers).forEach(pc => pc.close());
  peers = {}; peerStreams = {}; peerNames = {};
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (ws) { ws.close(); ws = null; }
  clearInterval(timerInterval);
}

/* ════ Pin ════ */
function pinTile(peerId) {
  if (pinnedPeer === peerId) {
    pinnedPeer = null;
    document.querySelectorAll('.video-tile').forEach(t => t.classList.remove('pinned'));
  } else {
    pinnedPeer = peerId;
    document.querySelectorAll('.video-tile').forEach(t => t.classList.remove('pinned'));
    document.getElementById('tile-' + peerId)?.classList.add('pinned');
  }
  relayout();
}

/* ════ Grid layout ════ */
function relayout() {
  const grid = document.getElementById('video-grid');
  const wrapper = document.getElementById('video-grid-wrapper');
  const n = grid.children.length;
  if (n === 0) return;

  const W = wrapper.clientWidth - 24;
  const H = wrapper.clientHeight - 24;

  let cols, rows;
  if (pinnedPeer && n > 1) {
    // Sidebar layout: pinned large left, others stacked right
    grid.style.gridTemplateColumns = '1fr 220px';
    grid.style.gridTemplateRows = `repeat(${n - 1}, 1fr)`;
    Array.from(grid.children).forEach((tile, i) => {
      if (tile.classList.contains('pinned')) {
        tile.style.gridColumn = '1';
        tile.style.gridRow = `1 / ${n}`;
